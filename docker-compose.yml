version: '3.8'

services:
  kamba-app:
    build: .
    container_name: kamba-career-tracker
    restart: unless-stopped
    ports:
      # Expone el puerto 3000 del contenedor en el puerto 3005 del host en todas las interfaces de red (0.0.0.0).
      # Esto te permitirá acceder desde http://192.168.40.10:3005 en tu red local.
      - "3005:3000"
    volumes:
      # Monta la carpeta data para la base de datos sqlite persistente
      - ./data:/app/data
      # Si necesitas que el HTML se actualice en vivo sin reconstruir el contenedor:
      - ./index.html:/app/index.html
      - ./app.js:/app/app.js
      - ./style.css:/app/style.css
      - ./server.js:/app/server.js
      - ./sw.js:/app/sw.js
      - ./.env:/app/.env
